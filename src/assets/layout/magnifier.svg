<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <title>AwesomeWM magnifier layout icon</title>
  <g stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer layout frame -->
    <rect x="6" y="10" width="52" height="40" rx="5"/>
    <!-- main magnified area -->
    <rect x="11" y="15" width="26" height="30" rx="3"/>
    <!-- secondary tiled areas -->
